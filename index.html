<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDECK v2.077 // Cyberpunk HUD Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', 'Consolas', monospace;
        }

        body {
            background-color: #05070a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: #FFE600;
            font-size: 24px;
            margin-bottom: 4px;
            text-shadow: 0 0 14px rgba(255, 230, 0, 0.7);
            letter-spacing: 2px;
        }

        header p {
            color: #FF0055;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .main-container {
            display: flex;
            gap: 24px;
            max-width: 1150px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* XREAL Display Simulator Frame */
        .xreal-display {
            position: relative;
            width: 760px;
            height: 430px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 35px rgba(255, 230, 0, 0.25);
            border: 2px solid #1a202c;
        }

        .xreal-badge {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(0, 0, 0, 0.85);
            color: #FFE600;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
            border: 1px solid rgba(255, 230, 0, 0.5);
            letter-spacing: 1.5px;
        }

        .video-simulator {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Pure Minimalist Cyberpunk 2077 Time HUD --- */
        .cyberpunk-time-hud {
            position: absolute;
            top: 35px;
            right: 35px;
            z-index: 100;
            user-select: none;
            transition: all 0.2s ease;
            background: transparent; /* 100% Transparent for XREAL Micro-OLED */
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hud-clock {
            color: #FFE600; /* Cyberpunk Signature Yellow */
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 14px rgba(255, 230, 0, 0.9);
        }

        .hud-battery {
            color: #00E5FF;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Cyberpunk Cyberdeck Controls Panel */
        .cyberdeck-panel {
            flex: 1;
            min-width: 320px;
            background: #080A0F;
            padding: 22px;
            border-radius: 12px;
            border: 2px solid #00E5FF;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
            height: fit-content;
        }

        .cyberdeck-panel h2 {
            font-size: 16px;
            color: #FFE600;
            margin-bottom: 16px;
            border-bottom: 1px solid #1a2332;
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        .quickhack-card {
            background: #0f1420;
            border: 1px solid #243247;
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 14px;
        }

        .quickhack-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .quickhack-title {
            font-size: 12px;
            color: #ffffff;
            font-weight: 700;
        }

        .quickhack-tag {
            font-size: 11px;
            color: #00E5FF;
        }

        .select-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 4px;
            background: #060910;
            color: #FFE600;
            border: 1px solid #243247;
            font-weight: 700;
            margin-top: 6px;
        }

        .range-slider {
            width: 100%;
            accent-color: #FFE600;
            margin-top: 8px;
        }

        .btn-start {
            background: #FFE600;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .btn-stop {
            background: #FF0055;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ CYBERDECK v2.077 // XREAL 1s HUD</h1>
        <p>AVAILABLE QUICKHACKS & OVERLAY CONFIGURATIONS</p>
    </header>

    <div class="main-container">
        <!-- XREAL Display Simulator -->
        <div class="xreal-display" id="xrealDisplay">
            <div class="xreal-badge">XREAL 1s • CYBERDECK HUD</div>
            
            <video class="video-simulator" autoplay loop muted poster="https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1200">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>

            <!-- Cyberpunk HUD Overlay -->
            <div class="cyberpunk-time-hud" id="hudWidget">
                <div class="hud-clock" id="clock">17:37:38</div>
                <div class="hud-battery" id="battery">▮▮▮▮▮ 88%</div>
            </div>
        </div>

        <!-- Cyberdeck Phone Menu Panel -->
        <div class="cyberdeck-panel">
            <h2>CYBERDECK CONFIGURATOR</h2>

            <!-- Quickhack #1: Scale -->
            <div class="quickhack-card">
                <div class="quickhack-header">
                    <div class="quickhack-title">QUICKHACK #1: SYSTEM HUD SCALE</div>
                    <div class="quickhack-tag">[READY]</div>
                </div>
                <label style="font-size:12px; color:#94a3b8;">HUD Size Scale: <span id="scaleVal" style="color:#FFE600; font-weight:bold;">1.00x</span></label>
                <input type="range" class="range-slider" min="75" max="150" value="100" oninput="updateScale(this.value)">
            </div>

            <!-- Quickhack #2: Position -->
            <div class="quickhack-card">
                <div class="quickhack-header">
                    <div class="quickhack-title">QUICKHACK #2: CORNER POSITION</div>
                    <div class="quickhack-tag">[TRACEABLE]</div>
                </div>
                <select class="select-input" onchange="setCornerPosition(this.value)">
                    <option value="right">[ TOP-RIGHT CORNER ]</option>
                    <option value="left">[ TOP-LEFT CORNER ]</option>
                </select>
            </div>

            <button class="btn-start">⚡ [ EXECUTE: START CYBERPUNK HUD ]</button>
            <button class="btn-stop">⏹️ [ TERMINATE: STOP HUD ]</button>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        let currentScale = 1.0;

        function updateScale(val) {
            currentScale = val / 100;
            document.getElementById('scaleVal').innerText = currentScale.toFixed(2) + 'x';
            
            const clock = document.getElementById('clock');
            const battery = document.getElementById('battery');

            clock.style.fontSize = (24 * currentScale) + 'px';
            battery.style.fontSize = (12 * currentScale) + 'px';
        }

        function setCornerPosition(pos) {
            const hud = document.getElementById('hudWidget');
            if (pos === 'left') {
                hud.style.left = (35 * currentScale) + 'px';
                hud.style.right = 'auto';
            } else {
                hud.style.right = (35 * currentScale) + 'px';
                hud.style.left = 'auto';
            }
        }
    </script>
</body>
</html>
