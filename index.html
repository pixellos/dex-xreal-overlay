<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDECK v 552.322 // Cyberpunk 2077 In-Game Quickhacks</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', 'Consolas', monospace;
        }

        body {
            background-color: #04070D;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: #FFE600;
            font-size: 24px;
            margin-bottom: 4px;
            text-shadow: 0 0 14px rgba(255, 230, 0, 0.7);
            letter-spacing: 2px;
        }

        header p {
            color: #FF0055;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .main-container {
            display: flex;
            gap: 24px;
            max-width: 1150px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* XREAL Display Simulator Frame */
        .xreal-display {
            position: relative;
            width: 760px;
            height: 430px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 35px rgba(255, 230, 0, 0.25);
            border: 2px solid #1a202c;
        }

        .xreal-badge {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(0, 0, 0, 0.85);
            color: #FFE600;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            z-index: 10;
            border: 1px solid rgba(255, 230, 0, 0.5);
            letter-spacing: 1.5px;
        }

        .video-simulator {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Pure Transparent Cyberpunk Traced Directions HUD --- */
        .cyberpunk-traced-hud {
            position: absolute;
            top: 35px;
            right: 35px;
            z-index: 100;
            user-select: none;
            transition: all 0.2s ease;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .hud-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hud-clock {
            color: #FFE600;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 14px rgba(255, 230, 0, 0.9);
        }

        .hud-battery {
            color: #00E5FF;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hud-nav-trace {
            color: #FF0055;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.9);
            display: none;
        }

        /* Authentic Cyberpunk 2077 In-Game Quickhack Menu Panel */
        .cyberdeck-panel {
            flex: 1;
            min-width: 340px;
            background: #04070D;
            padding: 20px;
            border-radius: 4px;
            border: 2px solid #00E5FF;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
            height: fit-content;
        }

        .cyberdeck-panel h2 {
            font-size: 11px;
            color: #FF0055;
            margin-bottom: 4px;
            letter-spacing: 1.5px;
        }

        .cyberdeck-panel h1 {
            font-size: 18px;
            color: #FFE600;
            margin-bottom: 16px;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a2436;
            padding-bottom: 6px;
        }

        /* Cyberpunk 2077 In-Game Quickhack Bar Styling */
        .ingame-quickhack-bar {
            background: #09111E;
            border: 2px solid #00E5FF;
            border-radius: 2px;
            margin-bottom: 10px;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }

        .ingame-quickhack-bar:hover {
            border-color: #FFE600;
            box-shadow: 0 0 12px rgba(255, 230, 0, 0.3);
        }

        .bar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-left {
            display: flex;
            flex-direction: column;
        }

        .bar-title {
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .bar-tag {
            font-size: 9px;
            color: #00E5FF;
            border: 1px solid #00E5FF;
            padding: 1px 5px;
            border-radius: 1px;
            margin-top: 3px;
            width: fit-content;
        }

        .bar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ram-badge {
            background: #050A12;
            border: 1px solid #1B2A40;
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ram-badge span {
            color: #00E5FF;
            font-size: 10px;
        }

        .icon-badge {
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 14px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .range-slider {
            width: 100%;
            accent-color: #FFE600;
            margin-top: 8px;
        }

        .btn-action {
            background: #FFE600;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 2px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .btn-stop {
            background: #FF0055;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 2px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ CYBERDECK v 552.322 // IN-GAME QUICKHACKS</h1>
        <p>CYBERPUNK 2077 HUD & NETRUNNER OPTIONS</p>
    </header>

    <div class="main-container">
        <!-- XREAL Display Simulator -->
        <div class="xreal-display" id="xrealDisplay">
            <div class="xreal-badge">XREAL 1s • CYBERWARE HUD</div>
            
            <video class="video-simulator" autoplay loop muted poster="https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1200">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>

            <!-- Cyberpunk Transparent Traced Vector HUD -->
            <div class="cyberpunk-traced-hud" id="hudWidget">
                <div class="hud-row">
                    <div class="hud-clock" id="clock">19:01:30</div>
                    <div class="hud-battery" id="battery">▮▮▮▮▮ 88%</div>
                </div>
                <div class="hud-nav-trace" id="navTrace">🠺 200m • MAIN ST TOWARDS CITY CENTER</div>
            </div>
        </div>

        <!-- Cyberpunk 2077 In-Game Quickhacks Menu Panel -->
        <div class="cyberdeck-panel">
            <h2>CYBERDECK v 552.322</h2>
            <h1>AVAILABLE QUICKHACKS:</h1>

            <!-- Quickhack #1: SYSTEM COLLAPSE (28 RAM) -->
            <div class="ingame-quickhack-bar">
                <div class="bar-top">
                    <div class="bar-left">
                        <div class="bar-title">SYSTEM COLLAPSE</div>
                        <div class="bar-tag">READY</div>
                    </div>
                    <div class="bar-right">
                        <div class="ram-badge">28 <span>▮</span></div>
                        <div class="icon-badge">🗲</div>
                    </div>
                </div>
                <label style="font-size:11px; color:#94a3b8; display:block; margin-top:8px;">HUD Scale: <span id="scaleVal" style="color:#FFE600; font-weight:bold;">1.00x</span></label>
                <input type="range" class="range-slider" min="25" max="150" value="100" oninput="updateScale(this.value)">
            </div>

            <!-- Quickhack #2: OVERHEAT (9 RAM) -->
            <div class="ingame-quickhack-bar">
                <div class="bar-top">
                    <div class="bar-left">
                        <div class="bar-title">OVERHEAT</div>
                        <div class="bar-tag">READY | TRACEABLE</div>
                    </div>
                    <div class="bar-right">
                        <div class="ram-badge">9 <span>▮</span></div>
                        <div class="icon-badge">🎯</div>
                    </div>
                </div>
                <select onchange="setCornerPosition(this.value)" style="width:100%; padding:4px; background:#050A12; color:#FFE600; border:1px solid #1B2A40; font-weight:bold; font-size:11px; margin-top:6px;">
                    <option value="right">[ TOP-RIGHT CORNER ]</option>
                    <option value="left">[ TOP-LEFT CORNER ]</option>
                </select>
            </div>

            <!-- Quickhack #3: PING (4 RAM) -->
            <div class="ingame-quickhack-bar">
                <div class="bar-top">
                    <div class="bar-left">
                        <div class="bar-title">PING</div>
                        <div class="bar-tag">INSTALLED</div>
                    </div>
                    <div class="bar-right">
                        <div class="ram-badge">4 <span>▮</span></div>
                        <div class="icon-badge">🪧</div>
                    </div>
                </div>
                <button onclick="toggleSimulatedNav()" style="background:#00E5FF; color:#000; border:none; padding:4px 8px; border-radius:2px; font-weight:bold; font-size:10px; cursor:pointer; width:100%; margin-top:6px;">
                    TOGGLE VECTOR TRACE
                </button>
            </div>

            <button class="btn-action">⚡ [ EXECUTE QUICKHACKS ]</button>
            <button class="btn-stop">⏹️ [ TERMINATE OVERLAY ]</button>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        let currentScale = 1.0;

        function updateScale(val) {
            currentScale = val / 100;
            document.getElementById('scaleVal').innerText = currentScale.toFixed(2) + 'x';
            
            const clock = document.getElementById('clock');
            const battery = document.getElementById('battery');

            clock.style.fontSize = (24 * currentScale) + 'px';
            battery.style.fontSize = (12 * currentScale) + 'px';
        }

        function setCornerPosition(pos) {
            const hud = document.getElementById('hudWidget');
            if (pos === 'left') {
                hud.style.left = (35 * currentScale) + 'px';
                hud.style.right = 'auto';
            } else {
                hud.style.right = (35 * currentScale) + 'px';
                hud.style.left = 'auto';
            }
        }

        let isNavActive = false;
        function toggleSimulatedNav() {
            isNavActive = !isNavActive;
            document.getElementById('navTrace').style.display = isNavActive ? 'block' : 'none';
        }
    </script>
</body>
</html>
