appId: com.example.dexoverlay
---
- launchApp

# Adjust HUD Scale
- scrollUntilVisible:
    element: "SYSTEM HUD SCALE"
    direction: DOWN
- drag:
    from:
      point: "50%, 40%" # Rough estimate for the scale slider
    to:
      point: "80%, 40%"

# Use Joystick
- scrollUntilVisible:
    element: "HUD ALIGNMENT CALIBRATOR"
    direction: DOWN
- swipe:
    start: "50%, 70%" # Calibration pad area
    end: "60%, 80%"
- assertVisible: "Offset: X=.*" # Verify the label updated (regex)

# Reset
- tapOn: "[ RESET ALIGNMENT ]"
- assertVisible: "Offset: X=40, Y=40"
